services:

  # ─── Base de données MySQL ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eig_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eig_db
      MYSQL_USER: eig_user
      MYSQL_PASSWORD: eig_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── API Backend Laravel ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-php
      dockerfile: Dockerfile
    container_name: eig_backend
    restart: unless-stopped
    environment:
      APP_NAME: "EIG Backend"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: eig_db
      DB_USERNAME: eig_user
      DB_PASSWORD: eig_password
      JWT_TTL: 10080
      FRONTEND_URL: http://localhost:5173
      ADMIN_URL: http://localhost:5174
      FILESYSTEM_DISK: public
    ports:
      - "8000:8000"
    volumes:
      - ./backend-php/app:/app/app
      - ./backend-php/routes:/app/routes
      - ./backend-php/database:/app/database
      - ./backend-php/config:/app/config
      - uploads_data:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy

  # ─── Interface Admin React ────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: eig_admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5174"
    volumes:
      - ./admin/src:/app/src

  # ─── Site Vitrine React ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eig_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src

volumes:
  mysql_data:
  uploads_data:
